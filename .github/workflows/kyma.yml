name: Équipe KYMA (arrière-plan)

on:
  workflow_dispatch:
    inputs:
      mission:
        description: "Mission pour l'équipe KYMA"
        required: false
  schedule:
    - cron: "0 7 * * 1" # chaque lundi à 07:00 UTC

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Lancer l'équipe
        run: npm run kyma -- "${{ github.event.inputs.mission || 'Veille hebdo streetwear + 3 idées de contenu Instagram pour KYMA (à confier à Maya)' }}"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Archiver le livrable
        uses: actions/upload-artifact@v4
        with:
          name: livrable-kyma
          path: out/
